name: project-app-personal-sandbox

services:
  app:
    build: ./app
    # container_name: web-app-sandbox
    hostname: web-app
    volumes: ["./app/src:/appcode"]
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - 8502:8501

  api:
    build: ./api
    # container_name: web-api-sandbox
    hostname: web-api
    volumes: ["./api:/apicode"]
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - 4001:4000

  db:
    env_file:
      - ./api/.env
    image: mysql:9
    # container_name: mysql_db-sandbox
    hostname: db
    # Ephemeral database: tmpfs (RAM) at /var/lib/mysql explicitly overrides
    # the mysql:9 image's VOLUME directive. Every recreate of the db
    # container reseeds from database-files/*.sql. Matches the main dev
    # compose and production behavior. To pick up SQL edits:
    # `docker compose -f sandbox.yaml down && docker compose -f sandbox.yaml up`.
    volumes:
      - "./database-files:/docker-entrypoint-initdb.d/:ro"
    tmpfs:
      - /var/lib/mysql
    ports:
      - 3201:3306
